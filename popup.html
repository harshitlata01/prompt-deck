<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PromptDeck</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;
  --surface:#0C0C0C;
  --elevated:#141414;
  --border:#1E1E1E;
  --text:#FFFFFF;
  --text-secondary:#A8A8A8;
  --muted:#666666;
  --cyan:#22D3EE;
  --blue:#3B82F6;
  --green:#00E87A;
  --red:#FF4D4D;
  --yellow:#F5C242;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  font-size:15px;line-height:1.5;
  display:flex;justify-content:center;
  padding:96px 24px;
}
.app{
  width:100%;max-width:600px;height:fit-content;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}
/* ── TOP BAR ── */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:20px 28px;display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px}
.brand img{width:20px;height:20px;border-radius:5px;flex-shrink:0}
.brand span{
  color:var(--cyan);font-size:11px;font-weight:600;
  letter-spacing:2%;text-transform:uppercase;
}
.caption{
  color:var(--muted);font-size:11px;font-weight:500;
  letter-spacing:2%;text-transform:uppercase;
  background:var(--elevated);border:1px solid var(--border);
  padding:4px 10px;border-radius:6px;
}
/* ── STATES ── */
#state-load,#state-slides{padding:32px 28px}
/* ── EMPTY STATE ── */
.empty-state{
  border:1px solid var(--border);border-radius:12px;
  padding:56px 24px;text-align:center;cursor:pointer;
  transition:border-color .15s ease;margin-bottom:20px;
}
.empty-state:hover,.empty-state.drag{border-color:var(--cyan)}
.empty-state svg{margin-bottom:20px;color:var(--text-secondary)}
.empty-state .headline{color:var(--text);font-size:16px;font-weight:600;margin-bottom:6px}
.empty-state .sub{color:var(--muted);font-size:13px}
#fileInput{display:none}
.parse-error{
  color:var(--red);font-size:12px;margin-top:12px;
  padding:12px;background:var(--surface);border:1px solid #FF4D4D33;
  border-radius:8px;display:none;
}
.parse-error code{color:var(--text-secondary)}
/* ── BUTTONS ── */
button{font-family:inherit}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-size:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  border-radius:8px;cursor:pointer;transition:border-color .15s ease,color .15s ease,opacity .15s ease;
  padding:11px 16px;
}
.btn svg{flex-shrink:0}
.btn:disabled{cursor:not-allowed;opacity:.4}
.btn-primary{background:var(--bg);border:1px solid var(--cyan);color:var(--text)}
.btn-primary:hover:not(:disabled){border-color:#67E8F9}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover:not(:disabled){border-color:#3A3A3A}
.btn-ghost{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  font-size:11px;padding:6px 12px;
}
.btn-ghost:hover{border-color:#3A3A3A;color:var(--text)}
/* ── SLIDES STATE ── */
.slides-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.slides-title{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:2%;text-transform:uppercase}
.action-row{display:flex;gap:12px;margin-bottom:24px}
.action-row .btn{flex:1}
/* ── SLIDE LIST ── */
.slide-list{overflow-y:auto;max-height:56vh;border:1px solid var(--border);border-radius:8px}
.slide-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-bottom:1px solid var(--border);
  background:var(--surface);
  transition:background-color .2s ease;
}
.slide-item:last-child{border-bottom:none}
.slide-item.active{background:var(--elevated)}
.slide-num{
  background:var(--elevated);border:1px solid var(--border);
  color:var(--text-secondary);font-size:11px;font-weight:600;
  padding:4px 8px;border-radius:5px;letter-spacing:1px;
  font-family:'SF Mono',ui-monospace,monospace;flex-shrink:0;
}
.slide-title{font-size:13px;color:var(--text);flex:1;font-weight:500}
.slide-status-text{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:2%;text-transform:uppercase;flex-shrink:0}
.slide-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0}
.slide-dot.active{background:var(--cyan);animation:fade 1.2s ease-in-out infinite}
.slide-dot.done{background:var(--green)}
.slide-dot.failed{background:var(--red)}
@keyframes fade{0%,100%{opacity:1}50%{opacity:.3}}
.slide-item.active .slide-status-text{color:var(--cyan)}
.slide-item.done .slide-status-text{color:var(--green)}
.slide-item.failed .slide-status-text{color:var(--red)}
/* ── BOTTOM ── */
.bottombar{
  background:var(--surface);border-top:1px solid var(--border);
  padding:12px 28px;font-size:11px;color:var(--muted);
  font-weight:500;letter-spacing:2%;text-transform:uppercase;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="brand"><img src="icons/icon48.png" alt=""><span>PromptDeck</span></span>
    <span class="caption" id="slideCount">No file</span>
  </div>

  <!-- STATE: LOAD FILE -->
  <div id="state-load">
    <div class="empty-state" id="dropZone">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <path d="M14 2v6h6"></path>
        <line x1="9" y1="13" x2="15" y2="13"></line>
        <line x1="9" y1="17" x2="15" y2="17"></line>
      </svg>
      <div class="headline">Load a deck script to begin</div>
      <div class="sub">Click to browse, or drag a .md file here</div>
    </div>
    <input type="file" id="fileInput" accept=".md,.txt">
    <div class="parse-error" id="parseError">
      No slides found. Check your .md has <code>## SLIDE XX — TITLE</code> headers.
    </div>
  </div>

  <!-- STATE: SLIDES LIST -->
  <div id="state-slides" style="display:none">
    <div class="slides-header">
      <span class="slides-title" id="slidesTitle">0 slides parsed</span>
      <button class="btn btn-ghost" id="resetBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Reset
      </button>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" id="startBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="6 3 20 12 6 21 6 3"></polygon>
        </svg>
        Start Sequence
      </button>
      <button class="btn btn-secondary" id="exportBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Export PDF
      </button>
    </div>
    <div class="slide-list" id="slideList"></div>
  </div>

  <div class="bottombar">PromptDeck · One conversation, one image per slide</div>

</div>

<script src="lib/pdf-lib.min.js"></script>
<script src="popup.js"></script>
</body>
</html>
