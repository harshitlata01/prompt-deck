<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PromptDeck</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--surface:#0C0C0C;--alt:#141414;--border:#1E1E1E;
  --white:#FFF;--muted:#666;--dim:#AAA;
  --blue:#3D8EFF;--green:#00E87A;--red:#FF3B3B;--yellow:#F5C242;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--white);
  font-family:'Inter',system-ui,sans-serif;
  display:flex;justify-content:center;
  padding:64px 20px;
}
.app{
  width:100%;max-width:560px;height:fit-content;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  box-shadow:0 24px 64px #00000080;
}
/* ── TOP BAR ── */
.topbar{
  background:#050505;border-bottom:1px solid var(--border);
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:8px}
.brand img{width:18px;height:18px;border-radius:4px;flex-shrink:0}
.brand span{color:var(--yellow);font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.slide-count{
  color:var(--muted);font-size:10px;
  background:var(--alt);border:1px solid var(--border);
  padding:2px 8px;border-radius:2px;letter-spacing:1px;
}
/* ── STATES ── */
#state-load,#state-slides{padding:20px}
/* ── LOAD STATE ── */
.drop-zone{
  border:1px dashed var(--border);border-radius:4px;
  padding:28px 16px;text-align:center;cursor:pointer;
  transition:border-color .2s;margin-bottom:16px;
}
.drop-zone:hover,.drop-zone.drag{border-color:var(--yellow)}
.drop-zone .icon{font-size:28px;margin-bottom:8px}
.drop-zone .label{color:var(--muted);font-size:12px;line-height:1.5}
.drop-zone .label b{color:var(--white)}
#fileInput{display:none}
.btn-primary{
  width:100%;padding:10px;background:var(--yellow);color:#000;
  border:none;border-radius:4px;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  transition:opacity .2s;
}
.btn-primary:hover{opacity:.85}
.parse-error{
  color:var(--red);font-size:11px;margin-top:10px;
  padding:8px;background:#1A0000;border:1px solid #FF3B3B44;
  border-radius:3px;display:none;
}
/* ── SLIDES STATE ── */
.slides-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.slides-title{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.btn-reset{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);border-radius:3px;font-size:10px;
  padding:3px 8px;cursor:pointer;
}
.btn-reset:hover{border-color:#333;color:var(--white)}
.btn-launch-all{
  width:100%;padding:9px;background:var(--green);color:#000;
  border:none;border-radius:4px;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
  margin-bottom:12px;transition:opacity .2s;
}
.btn-launch-all:hover{opacity:.85}
.btn-launch-all:disabled{background:var(--alt);color:var(--muted);cursor:not-allowed}
/* ── SLIDE LIST ── */
.slide-list{overflow-y:auto;max-height:60vh}
.slide-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.slide-item:last-child{border-bottom:none}
.slide-num{
  background:var(--alt);border:1px solid var(--border);
  color:var(--yellow);font-size:8px;font-weight:800;
  padding:3px 7px;border-radius:2px;letter-spacing:1.5px;
  font-family:monospace;flex-shrink:0;
}
.slide-title{font-size:11.5px;color:var(--white);flex:1;font-weight:500}
.slide-status{
  width:6px;height:6px;border-radius:50%;
  background:var(--border);flex-shrink:0;transition:background .3s;
}
.slide-status.done{background:var(--green);box-shadow:0 0 4px #00E87A88}
.btn-inject{
  padding:5px 10px;background:var(--alt);border:1px solid var(--border);
  color:var(--white);border-radius:3px;font-size:10px;font-weight:600;
  cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all .15s;
}
.btn-inject:hover{background:#1a1a1a;border-color:#333}
.btn-inject.done{background:#001A0D;border-color:var(--green);color:var(--green)}
/* ── BOTTOM ── */
.bottombar{
  background:#050505;border-top:1px solid var(--border);
  padding:8px 16px;font-size:9px;color:#333;
  font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="brand"><img src="icons/icon48.png" alt=""><span>PromptDeck</span></span>
    <span class="slide-count" id="slideCount">NO FILE</span>
  </div>

  <!-- STATE: LOAD FILE -->
  <div id="state-load">
    <div class="drop-zone" id="dropZone">
      <div class="icon">📄</div>
      <div class="label">
        <b>Click to load your deck script (.md)</b><br>
        or drag &amp; drop it here
      </div>
    </div>
    <input type="file" id="fileInput" accept=".md,.txt">
    <div class="parse-error" id="parseError">
      No slides found. Check your .md has <code>## SLIDE XX — TITLE</code> headers.
    </div>
  </div>

  <!-- STATE: SLIDES LIST -->
  <div id="state-slides" style="display:none">
    <div style="padding:12px 20px 0">
      <div class="slides-header">
        <span class="slides-title" id="slidesTitle">0 SLIDES</span>
        <button class="btn-reset" id="resetBtn">← Reset</button>
      </div>
      <button class="btn-launch-all" id="launchAllBtn">
        🚀 Inject All into ChatGPT
      </button>
      <div class="slide-list" id="slideList"></div>
    </div>
  </div>

  <div class="bottombar">PROMPTDECK · AUTO-INJECT FOR CHATGPT</div>

</div>

<script src="popup.js"></script>
</body>
</html>
